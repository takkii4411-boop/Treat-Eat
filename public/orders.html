<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Orders — Treat & Eat</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=DM+Sans:wght@300;400;500&family=Great+Vibes&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--rose:#b03060;--rose-light:#e8a0bf;--rose-pale:#fde8f0;--ivory:#faf5ef;--ivory2:#f3ece2;--dark:#1a0a12;--dark2:#2d1520;--gold:#c9944a;--gold2:#e8c17a;--text:#1a0a12;--muted:#7a5060}
body{font-family:'DM Sans',sans-serif;background:var(--ivory);color:var(--text)}
nav{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:1rem 3rem;background:rgba(250,245,239,0.85);backdrop-filter:blur(20px);border-bottom:1px solid rgba(176,48,96,0.12)}
.nav-brand-wrap{display:flex;align-items:center;gap:12px;text-decoration:none}
.nav-logo-img{height:55px;width:auto;border-radius:50%;box-shadow:0 2px 8px rgba(176,48,96,0.15)}
.nav-brand{font-family:'Great Vibes',cursive;font-size:1.8rem;color:var(--rose);letter-spacing:.02em}
.nav-links{display:flex;gap:2.5rem;list-style:none}
.nav-links a{text-decoration:none;font-size:.75rem;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);transition:color .2s}
.nav-links a:hover{color:var(--rose)}
@media(max-width:768px){nav{padding:.8rem 1.5rem}.nav-links{display:none}}
</style>
</head>
<body>
<nav>
  <a href="/" class="nav-brand-wrap">
    <img src="logo.png" alt="Treat & Eat Logo" class="nav-logo-img">
    <span class="nav-brand">Treat & Eat</span>
  </a>
  <ul class="nav-links">
    <li><a href="/">Home</a></li>
    <li><a href="/cart.html">Cart</a></li>
  </ul>
</nav>

<div class="page-section">
  <h1>My <em>Orders</em></h1>
  <p class="page-sub">View all your past orders and their status</p>

  <div id="orders-empty" class="empty-state" style="display:none">
    <div class="big-icon">📋</div>
    <h3>No orders yet</h3>
    <p>You haven't placed any orders. Start browsing our menu!</p>
    <a href="/" class="hero-cta" style="display:inline-flex">Browse Menu</a>
  </div>

  <div id="orders-list"></div>
</div>

<script>
async function loadOrders() {
  const user = await fetch('/api/auth/me').then(r => r.json());
  if (!user.user) {
    window.location.href = '/login.html';
    return;
  }

  const orders = await fetch('/api/orders').then(r => r.json());
  const container = document.getElementById('orders-list');
  const emptyEl = document.getElementById('orders-empty');

  if (orders.length === 0) {
    emptyEl.style.display = 'block';
    container.innerHTML = '';
    return;
  }

  emptyEl.style.display = 'none';

  container.innerHTML = orders.map(order => {
    const statusClass = `status-${order.status.replace(/\s+/g, '-').toLowerCase()}`;
    const itemsHtml = order.items.map(item => `
      <div class="order-item">
        <span>${item.productName} × ${item.quantity}</span>
        <span>₹${item.price * item.quantity}</span>
      </div>
    `).join('');

    return `
      <div class="order-card" style="margin-bottom:1rem">
        <div class="order-header">
          <div>
            <div class="order-id">Order #${order.id}</div>
            <div class="order-date">${new Date(order.createdAt).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' })}</div>
          </div>
          <span class="order-status ${statusClass}">${order.status.charAt(0).toUpperCase() + order.status.slice(1)}</span>
        </div>
        <div class="order-items">${itemsHtml}</div>
        <div class="order-total">Total: ₹${order.total}</div>
      </div>
    `;
  }).join('');
}

loadOrders();
</script>
</body>
</html>
