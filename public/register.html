<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register — Treat & Eat</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=DM+Sans:wght@300;400;500&family=Great+Vibes&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--rose:#b03060;--rose-light:#e8a0bf;--rose-pale:#fde8f0;--ivory:#faf5ef;--ivory2:#f3ece2;--dark:#1a0a12;--dark2:#2d1520;--gold:#c9944a;--gold2:#e8c17a;--text:#1a0a12;--muted:#7a5060}
body{font-family:'DM Sans',sans-serif;background:var(--ivory);color:var(--text)}
nav{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:1rem 3rem;background:rgba(250,245,239,0.85);backdrop-filter:blur(20px);border-bottom:1px solid rgba(176,48,96,0.12)}
.nav-brand-wrap{display:flex;align-items:center;gap:12px;text-decoration:none}
.nav-logo-img{height:55px;width:auto;border-radius:50%;box-shadow:0 2px 8px rgba(176,48,96,0.15)}
.nav-brand{font-family:'Great Vibes',cursive;font-size:1.8rem;color:var(--rose);letter-spacing:.02em}
.nav-links{display:flex;gap:2.5rem;list-style:none}
.nav-links a{text-decoration:none;font-size:.75rem;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);transition:color .2s}
.nav-links a:hover{color:var(--rose)}
</style>
</head>
<body>
<nav>
  <a href="/" class="nav-brand-wrap">
    <img src="logo.png" alt="Treat & Eat Logo" class="nav-logo-img">
    <span class="nav-brand">Treat & Eat</span>
  </a>
  <ul class="nav-links">
    <li><a href="/">Home</a></li>
  </ul>
</nav>

<div class="auth-page">
  <div class="auth-card">
    <h1>Create <em>Account</em></h1>
    <p class="auth-sub">Join us to start ordering delicious treats!</p>
    <div class="auth-error" id="register-error"></div>
    <form id="register-form">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" required placeholder="Your name">
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" required placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" placeholder="Your phone number">
      </div>
      <div class="form-group">
        <label for="address">Delivery Address</label>
        <textarea id="address" placeholder="Your delivery address"></textarea>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" required minlength="6" placeholder="At least 6 characters">
      </div>
      <button type="submit" class="btn-primary">Create Account</button>
    </form>
    <div class="auth-footer">
      Already have an account? <a href="/login.html">Login</a>
    </div>
  </div>
</div>

<script>
document.getElementById('register-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  const errorEl = document.getElementById('register-error');
  const data = await fetch('/api/auth/register', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      name: document.getElementById('name').value,
      email: document.getElementById('email').value,
      phone: document.getElementById('phone').value,
      address: document.getElementById('address').value,
      password: document.getElementById('password').value
    })
  }).then(r => r.json());
  if (data.success) {
    window.location.href = '/';
  } else {
    errorEl.textContent = data.error || 'Registration failed';
    errorEl.style.display = 'block';
  }
});
</script>
</body>
</html>
